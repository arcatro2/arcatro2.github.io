<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RandomPrompter</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f7f8fa;
      --muted: #6b7280;
      --text: #0f172a;
      --accent: #2563eb;
      --border: #e6e9ef;
      --radius: 12px;
      --gap: 12px;
      --max-width: 980px;
      --shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      font-size: 16px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
    }

    .topbar {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px
    }

    .title {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.875rem
    }

    .controls {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 8px
    }

    .select {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: white
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: transparent
    }

    .template-input {
      width: 100%;
      height: 240px;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      min-height: 140px;
      font-size: 0.98rem;
      resize: vertical;
    }

    /* Main layout: file list compact, preview below editor */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    /* 파일 목록을 작게 고정 (가로 스크롤 허용) */
    .compact-file-list {
      display: flex;
      gap: 8px;
      align-items: center;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      overflow: auto;
      white-space: nowrap;
      max-height: 64px;
      margin-top: 10px;
    }

    .compact-file-list button {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .editor-area {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px
    }

    .current-file {
      font-weight: 600;
      color: var(--muted)
    }

    .editor-actions {
      display: flex;
      gap: 8px
    }

    .result-box {
      margin-top: 10px;
      padding: 14px;
      border-radius: 10px;
      border: 1px dashed var(--border);
      background: #fff;
      min-height: 100px;
      white-space: pre-wrap;
      font-size: 0.96rem;
    }

    .preview-area {
      margin-top: 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;

    }

    .preview-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px
    }

    .preview-lines {
      max-height: 220px;
      overflow: auto;
      border-radius: 8px;
      padding: 6px;
      background: #fbfcff;
      border: 1px solid var(--border)
    }
    /* preview container: 세로 스크롤만 허용, 가로로 넘치지 않게 */
    .preview-lines {
      max-height: 220px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px;
      box-sizing: border-box;
    }
    /* 각 줄: 체크박스 고정, 텍스트는 유연하게 줄바꿈 */
    .preview-line {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 6px;
      border-radius: 6px;
      box-sizing: border-box;
    }
    /* 체크박스가 레이아웃을 밀지 않도록 고정 크기 */
    .preview-line input[type="checkbox"] {
      flex: 0 0 20px;
      width: 20px;
      height: 20px;
    }
    /* 핵심: 텍스트는 줄바꿈 허용, 긴 단어 강제 분할, 축소 허용 */
    .preview-line .line-text {
      flex: 1 1 auto;
      /* 가로 공간을 유연하게 사용 */
      min-width: 0;
      /* flex 아이템 축소 허용 (필수) */
      white-space: normal;
      /* 줄바꿈 허용 */
      overflow-wrap: anywhere;
      /* 긴 단어 강제 분할 */
      word-break: break-word;
      /* 호환성 보강 */
      hyphens: auto;
      /* 가능한 경우 하이픈 분할 허용 */
      font-family: ui-monospace, monospace;
      font-size: 0.95rem;
      color: var(--text);
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem
    }

    .visually-hidden {
      position: absolute !important;
      height: 1px;
      width: 1px;
      overflow: hidden;
      clip: rect(1px, 1px, 1px, 1px);
      white-space: nowrap
    }

    @media(min-width:820px) {
      .main-grid {
        grid-template-columns: 1fr
      }

      .compact-file-list {
        max-height: 80px
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <header class="topbar">
      <h1 class="title">RandomPrompter</h1>
      <small class="subtitle">Light theme</small>
    </header>

    <section class="controls">
      <label class="file-label">
        <input id="folderInput" type="file" webkitdirectory directory multiple class="visually-hidden" />
        <button id="chooseFolderBtn" class="btn">폴더/파일 선택</button>
      </label>

      <div class="row">
        <select id="templateSelect" class="select" aria-label="템플릿 선택"></select>
        <button id="generateBtn" class="btn primary">생성</button>
      </div>

      <textarea id="templateInput" class="template-input" placeholder="템플릿을 입력하세요. 예: Hello, <name>"></textarea>
    </section>

    <section class="main-grid">
      <div class="editor-area">
        <div class="editor-header">
          <div class="editor-actions">
            <button id="copyResultBtn" class="btn">Copy</button>
          </div>
        </div>

        <!-- 결과창 (템플릿 생성 결과) -->
        <div class="result-box" id="result">결과가 여기에 표시됩니다.</div>

        <!-- txt 파일 미리보기 섹션 -->
        <div class="compact-file-list" id="fileList">No .txt files loaded.</div>
        <div class="preview-area" id="previewArea" aria-live="polite">
          <div class="preview-controls">
            <div style="flex:1;color:var(--muted)"><span id="currentFileName" class="current-file"></span></div>
            <button id="selectAllBtn" class="btn">Select all</button>
            <button id="clearSelectionBtn" class="btn">Clear</button>
          </div>
          <div class="preview-lines" id="previewLines">미리보기를 위해 파일을 선택하세요.</div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <small>© Template Generator</small>
    </footer>
  </main>

  <script>
    const folderInput = document.getElementById('folderInput');
    const generateBtn = document.getElementById('generateBtn');
    const resultEl = document.getElementById('result');
    const templateInput = document.getElementById('templateInput');
    const fileListEl = document.getElementById('fileList');
    const currentFileNameEl = document.getElementById('currentFileName');
    const copyResultBtn = document.getElementById('copyResultBtn');
    const templateSelect = document.getElementById('templateSelect');
    const chooseFolderBtn = document.getElementById('chooseFolderBtn');
    const previewLinesEl = document.getElementById('previewLines');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const clearSelectionBtn = document.getElementById('clearSelectionBtn');

    let dataMap = {}; // { filenameKey: [{value, weight, raw, handle?}], ... }
    let fileHandles = {}; // filenameKey -> FileSystemFileHandle (if available)
    let currentFileKey = null; // selected file key
    let selectedLinesMap = {}; // filenameKey -> Set(index)

    // Utility: parse lines into {value, weight, raw}
    function parseLinesToItems(lines) {
      const DEFAULT_WEIGHT = 100;
      return lines
        .map(line => String(line || '').trim())
        .filter(s => s.length > 0 && !s.startsWith('//'))
        .map(s => {
          const m = s.match(/^(\d+)\s*:(.*)$/);
          if (m) {
            const w = parseInt(m[1], 10);
            return { value: (m[2] || '').trim(), weight: isNaN(w) ? DEFAULT_WEIGHT : w, raw: s };
          } else {
            return { value: s, weight: DEFAULT_WEIGHT, raw: s };
          }
        })
        .filter(it => it.value.length > 0);
    }

    chooseFolderBtn.addEventListener('click', () => {
      folderInput.click();
    });

    folderInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files || []);
      window.lastUploadedFiles = files;
      await loadFilesFromFileList(files);
      renderFileList();
      updateTemplateSelect();
      autoSelectFirst();
      resultEl.textContent = `Loaded: ${Object.keys(dataMap).join(', ')}`;
    });

    generateBtn.addEventListener('click', () => {
      const template = templateInput.value || '';
      if (!template) {
        resultEl.textContent = 'Enter a template first.';
        return;
      }
      if (Object.keys(dataMap).length === 0) {
        resultEl.textContent = 'No text arrays loaded. Select folder or upload files.';
        return;
      }
      const out = fillTemplateWithRecursion(template, 30);
      resultEl.textContent = out;
    });

    function renderFileList() {
      fileListEl.innerHTML = '';
      const keys = Object.keys(dataMap).sort();
      if (keys.length === 0) {
        fileListEl.textContent = 'No .txt files loaded.';
        return;
      }
      for (const key of keys) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = key + ` (${dataMap[key].length})`;
        btn.addEventListener('click', () => selectFileKey(key));
        fileListEl.appendChild(btn);
      }
    }

    function selectFileKey(key) {
      currentFileKey = key;
      currentFileNameEl.textContent = key + '.txt';
      const items = dataMap[key] || [];
      const rawText = items.map(it => (it.raw ? it.raw : (it.weight && it.weight !== 100 ? `${it.weight}:${it.value}` : it.value))).join('\n');
      // render preview lines with checkboxes
      renderPreviewLines(key, items);
    }

    // Render preview lines with checkboxes
    function renderPreviewLines(key, items) {
      previewLinesEl.innerHTML = '';
      if (!items || items.length === 0) {
        previewLinesEl.textContent = 'Empty file.';
        return;
      }
      if (!selectedLinesMap[key]) selectedLinesMap[key] = new Set();
      items.forEach((it, idx) => {
        const row = document.createElement('div');
        row.className = 'preview-line';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = selectedLinesMap[key].has(idx);
        cb.addEventListener('change', () => {
          if (cb.checked) selectedLinesMap[key].add(idx);
          else selectedLinesMap[key].delete(idx);
        });
        const span = document.createElement('div');
        span.className = 'line-text';
        span.textContent = it.raw ? it.raw : it.value;
        // clicking the text toggles checkbox
        span.addEventListener('click', () => {
          cb.checked = !cb.checked;
          if (cb.checked) selectedLinesMap[key].add(idx);
          else selectedLinesMap[key].delete(idx);
        });
        row.appendChild(cb);
        row.appendChild(span);
        previewLinesEl.appendChild(row);
      });
    }

    selectAllBtn.addEventListener('click', () => {
      if (!currentFileKey) return;
      const items = dataMap[currentFileKey] || [];
      selectedLinesMap[currentFileKey] = new Set(items.map((_, i) => i));
      renderPreviewLines(currentFileKey, items);
    });

    clearSelectionBtn.addEventListener('click', () => {
      if (!currentFileKey) return;
      selectedLinesMap[currentFileKey] = new Set();
      renderPreviewLines(currentFileKey, dataMap[currentFileKey] || []);
    });

    // Replaces <...> patterns, supports inline options and filename keys
    function fillTemplateWithRecursion(template, maxIterations = 30) {
      function parseInlineOptions(inner) {
        const DEFAULT_INLINE_WEIGHT = 1;
        return inner.split('|').map(tok => {
          const s = tok.trim();
          if (!s) return null;
          const m = s.match(/^(\d+)\s*:(.*)$/);
          if (m) {
            const w = parseInt(m[1], 10);
            const val = (m[2] || '').trim();
            return val ? { value: val, weight: isNaN(w) ? DEFAULT_INLINE_WEIGHT : w } : null;
          } else {
            return { value: s, weight: DEFAULT_INLINE_WEIGHT };
          }
        }).filter(Boolean);
      }

      function pickFromInline(inner) {
        const items = parseInlineOptions(inner);
        if (!items || items.length === 0) return '';
        const total = items.reduce((s, it) => s + (it.weight > 0 ? it.weight : 0), 0);
        if (total <= 0) return items[items.length - 1].value || '';
        let r = Math.random() * total;
        for (const it of items) {
          const w = it.weight > 0 ? it.weight : 0;
          if (r < w) return it.value;
          r -= w;
        }
        return items[items.length - 1].value || '';
      }

      let current = template;
      let iteration = 0;

      while (iteration < maxIterations) {
        let replacedInThisPass = false;

        current = current.replace(/<([^<>]+)>/g, (match, inner) => {
          const key = inner.trim();
          if (key.includes('|')) {
            const chosen = pickFromInline(key);
            replacedInThisPass = true;
            return chosen;
          }

          const items = dataMap[key];
          if (!items || items.length === 0) {
            replacedInThisPass = true;
            return '';
          }

          const chosen = pickRandomFromItems(items, key);
          replacedInThisPass = true;
          return chosen;
        });

        iteration += 1;
        if (!replacedInThisPass) break;
      }

      return current;
    }

    // Weighted random pick: items = [{value, weight}, ...]
    // 확장: key를 전달하면 selectedLinesMap[key]가 있으면 그 인덱스들만 사용
    function pickRandomFromItems(items, key = null) {
      let pool = items;
      if (key && selectedLinesMap[key] && selectedLinesMap[key].size > 0) {
        const idxs = Array.from(selectedLinesMap[key]).filter(i => i >= 0 && i < items.length);
        if (idxs.length > 0) {
          pool = idxs.map(i => items[i]);
        }
      }
      const total = pool.reduce((s, it) => s + (it.weight > 0 ? it.weight : 0), 0);
      if (total <= 0) return pool[pool.length - 1].value || '';
      let r = Math.random() * total;
      for (const it of pool) {
        const w = it.weight > 0 ? it.weight : 0;
        if (r < w) return it.value;
        r -= w;
      }
      return pool[pool.length - 1].value || '';
    }

    // Load files from a FileList (upload fallback)
    async function loadFilesFromFileList(fileList) {
      dataMap = {};
      fileHandles = {};
      selectedLinesMap = {};
      for (const f of fileList) {
        if (!f.name.toLowerCase().endsWith('.txt')) continue;
        try {
          const text = await f.text();
          const lines = text.split(/\r?\n/).map(s => s.replace(/\/\/.*$/, '').trim()).filter(s => s.length > 0);
          const key = f.name.replace(/\.[^/.]+$/, '');
          dataMap[key] = parseLinesToItems(lines);
          selectedLinesMap[key] = new Set(); // 초기 선택 비어있음
        } catch (err) {
          console.warn('Failed to read', f.name, err);
        }
      }
    }

    // Load all .txt files from a directory handle (non-recursive)
    async function loadAllTxtFromDirectoryHandle(dirHandle) {
      dataMap = {};
      fileHandles = {};
      selectedLinesMap = {};
      for await (const [name, handle] of dirHandle.entries()) {
        if (handle.kind === 'file' && name.toLowerCase().endsWith('.txt')) {
          try {
            const file = await handle.getFile();
            const text = await file.text();
            const lines = text.split(/\r?\n/).map(s => s.replace(/\/\/.*$/, '').trim()).filter(s => s.length > 0);
            const key = name.replace(/\.[^/.]+$/, '');
            const items = parseLinesToItems(lines).map(it => ({ ...it, handle }));
            dataMap[key] = items;
            fileHandles[key] = handle;
            selectedLinesMap[key] = new Set();
          } catch (err) {
            console.warn('Failed to read file in dir', name, err);
          }
        }
      }
    }

    function autoSelectFirst() {
      const keys = Object.keys(dataMap);
      if (keys.length > 0) selectFileKey(keys[0]);
    }

    copyResultBtn.addEventListener('click', async () => {
      const text = resultEl.innerText || resultEl.textContent || '';
      if (!text) {
        copyResultBtn.textContent = 'Empty';
        setTimeout(() => copyResultBtn.textContent = 'Copy', 1000);
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        copyResultBtn.textContent = 'Copied';
        setTimeout(() => copyResultBtn.textContent = 'Copy', 1200);
        return;
      } catch (err) { }
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        copyResultBtn.textContent = ok ? 'Copied' : 'Failed';
        setTimeout(() => copyResultBtn.textContent = 'Copy', 1200);
      } catch (err) {
        copyResultBtn.textContent = 'Failed';
        setTimeout(() => copyResultBtn.textContent = 'Copy', 1200);
      }
    });

    // templateSelect update and change handling
    function updateTemplateSelect() {
      if (!templateSelect) return;
      templateSelect.innerHTML = '';
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = '— load template.txt —';
      templateSelect.appendChild(defaultOpt);

      const key = 'template';
      const items = dataMap[key];

      if (!items || items.length === 0) {
        templateSelect.disabled = true;
        return;
      }

      templateSelect.disabled = false;
      items.forEach((it, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = idx;
        templateSelect.appendChild(opt);
      });
    }

    if (templateSelect) {
      templateSelect.addEventListener('change', () => {
        const val = templateSelect.value;
        if (!val) return;
        const key = 'template';
        const items = dataMap[key];
        const idx = parseInt(val, 10);
        if (!items || isNaN(idx) || idx < 0 || idx >= items.length) return;
        const chosenText = items[idx].raw ? items[idx].raw : items[idx].value;
        templateInput.value = chosenText;
      });
    }

    // Optional: allow pressing Enter on file list buttons to select
    fileListEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target && e.target.tagName === 'BUTTON') {
        e.target.click();
      }
    });
  </script>
</body>

</html>
